name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: provider-bread-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: "66c0373dc7fca549e5803087b9487edfe3aca0a1"

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!**/*.png'
              - '!**/*.svg'

  no-hardware-linux:
    name: Linux Build and Test (no hardware)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: anolis-provider-bread

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Setup vcpkg
        uses: anolishq/.github/.github/actions/setup-vcpkg@acf7758d393dab943086634dd9e07a1a49e6ce0a # main
        with:
          vcpkg-commit: ${{ env.VCPKG_COMMIT }}
          triplet: x64-linux-static

      - name: Configure
        working-directory: anolis-provider-bread
        run: cmake --preset ci-linux-release

      - name: Build
        working-directory: anolis-provider-bread
        run: cmake --build --preset ci-linux-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        run: ctest --preset ci-linux-release

  no-hardware-windows:
    name: Windows Build and Test (no hardware)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: anolis-provider-bread

      - name: Setup vcpkg
        uses: anolishq/.github/.github/actions/setup-vcpkg@acf7758d393dab943086634dd9e07a1a49e6ce0a # main
        with:
          vcpkg-commit: ${{ env.VCPKG_COMMIT }}
          triplet: x64-windows

      - name: Configure
        working-directory: anolis-provider-bread
        shell: pwsh
        run: cmake --preset ci-windows-release

      - name: Build
        working-directory: anolis-provider-bread
        shell: pwsh
        run: cmake --build --preset ci-windows-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        shell: pwsh
        run: ctest --preset ci-windows-release

  version-sync:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    uses: anolishq/.github/.github/workflows/version-sync.yml@acf7758d393dab943086634dd9e07a1a49e6ce0a # main
    with:
      python-version: '3.12'
      working-directory: '.'

  ok:
    name: ok
    if: always()
    needs:
      - changes
      - no-hardware-linux
      - no-hardware-windows
      - version-sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate job results
        run: |
          echo "Job results: ${{ toJSON(needs.*.result) }}"
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
