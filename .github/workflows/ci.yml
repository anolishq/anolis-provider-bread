name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  workflow_dispatch:

concurrency:
  group: provider-bread-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: "66c0373dc7fca549e5803087b9487edfe3aca0a1"

permissions:
  contents: read

jobs:
  no-hardware-linux:
    name: Linux Build and Test (no hardware)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: anolis-provider-bread

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          doNotCache: false

      - name: Configure
        working-directory: anolis-provider-bread
        run: cmake --preset ci-linux-release

      - name: Build
        working-directory: anolis-provider-bread
        run: cmake --build --preset ci-linux-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        run: ctest --preset ci-linux-release

  no-hardware-windows:
    name: Windows Build and Test (no hardware)
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: anolis-provider-bread

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          doNotCache: false

      - name: Configure
        working-directory: anolis-provider-bread
        shell: pwsh
        run: cmake --preset ci-windows-release

      - name: Build
        working-directory: anolis-provider-bread
        shell: pwsh
        run: cmake --build --preset ci-windows-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        shell: pwsh
        run: ctest --preset ci-windows-release

  version-sync:
    uses: anolishq/.github/.github/workflows/version-sync.yml@15f6901a9ef7e845841d371a64addb04b0f7755a # main
    with:
      python-version: '3.12'
      working-directory: '.'
