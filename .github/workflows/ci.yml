name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "**/*.png"
      - "**/*.svg"
  workflow_dispatch:

concurrency:
  group: provider-bread-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_COMMIT: "66c0373dc7fca549e5803087b9487edfe3aca0a1"

permissions:
  contents: read

jobs:
  no-hardware-linux:
    name: Linux Build and Test (no hardware)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@v4
        with:
          path: anolis-provider-bread

      - name: Checkout CRUMBS
        uses: actions/checkout@v4
        with:
          repository: feastorg/CRUMBS
          ref: v0.12.2
          path: CRUMBS

      - name: Checkout bread-crumbs-contracts
        uses: actions/checkout@v4
        with:
          repository: feastorg/bread-crumbs-contracts
          ref: v0.4.2
          path: bread-crumbs-contracts

      - name: Checkout linux-wire
        uses: actions/checkout@v4
        with:
          repository: feastorg/linux-wire
          ref: v0.1.2
          path: linux-wire

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          doNotCache: false

      - name: Configure
        working-directory: anolis-provider-bread
        run: cmake --preset ci-linux-release

      - name: Build
        working-directory: anolis-provider-bread
        run: cmake --build --preset ci-linux-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        run: ctest --preset ci-linux-release

  no-hardware-windows:
    name: Windows Build and Test (no hardware)
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@v4
        with:
          path: anolis-provider-bread

      - name: Install CRUMBS from release
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/feastorg/CRUMBS/archive/refs/tags/v0.12.2.tar.gz" -OutFile "crumbs.tar.gz"
          tar -xzf crumbs.tar.gz
          cmake -S CRUMBS-0.12.2 -B crumbs-build -A x64 `
            -DCRUMBS_ENABLE_LINUX_HAL=OFF `
            -DCRUMBS_BUILD_EXAMPLES=OFF `
            -DCRUMBS_ENABLE_TESTS=OFF `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\deps-install"
          cmake --build crumbs-build --config Release --parallel
          cmake --install crumbs-build --config Release

      - name: Install bread-crumbs-contracts from release
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/feastorg/bread-crumbs-contracts/archive/refs/tags/v0.4.2.tar.gz" -OutFile "bread-contracts.tar.gz"
          tar -xzf bread-contracts.tar.gz
          cmake -S bread-crumbs-contracts-0.4.2 -B bread-contracts-build -A x64 `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}\deps-install" `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\deps-install"
          cmake --build bread-contracts-build --config Release --parallel
          cmake --install bread-contracts-build --config Release

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          doNotCache: false

      - name: Configure
        working-directory: anolis-provider-bread
        shell: pwsh
        run: cmake --preset ci-windows-release "-DCMAKE_PREFIX_PATH=${{ github.workspace }}\deps-install"

      - name: Build
        working-directory: anolis-provider-bread
        shell: pwsh
        run: cmake --build --preset ci-windows-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        shell: pwsh
        run: ctest --preset ci-windows-release

  version-sync:
    uses: anolishq/.github/.github/workflows/version-sync.yml@main
    with:
      python-version: '3.12'
      working-directory: '.'
