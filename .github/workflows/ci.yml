name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: provider-bread-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!**/*.png'
              - '!**/*.svg'

  no-hardware-linux:
    name: Linux Build and Test (no hardware)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: anolis-provider-bread

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Setup vcpkg
        uses: anolishq/.github/.github/actions/setup-vcpkg@c76784aff711e6540d539f6a5c3ea33c63627930 # v2
        with:
          triplet: x64-linux-static

      - name: Configure
        working-directory: anolis-provider-bread
        run: cmake --preset ci-linux-release

      - name: Build
        working-directory: anolis-provider-bread
        run: cmake --build --preset ci-linux-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        run: ctest --preset ci-linux-release

  no-hardware-windows:
    name: Windows Build and Test (no hardware)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: anolis-provider-bread

      - name: Setup vcpkg
        uses: anolishq/.github/.github/actions/setup-vcpkg@c76784aff711e6540d539f6a5c3ea33c63627930 # v2
        with:
          triplet: x64-windows

      - name: Configure
        working-directory: anolis-provider-bread
        shell: pwsh
        run: cmake --preset ci-windows-release

      - name: Build
        working-directory: anolis-provider-bread
        shell: pwsh
        run: cmake --build --preset ci-windows-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        shell: pwsh
        run: ctest --preset ci-windows-release

  provider-conformance:
    name: ADPP Conformance (Linux)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: anolis-provider-bread

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Setup vcpkg
        uses: anolishq/.github/.github/actions/setup-vcpkg@c76784aff711e6540d539f6a5c3ea33c63627930 # v2
        with:
          triplet: x64-linux-static

      - name: Build provider (no hardware)
        working-directory: anolis-provider-bread
        run: |
          cmake --preset ci-linux-release
          cmake --build --preset ci-linux-release --parallel

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Pull the pinned anolis-protocol[conformance] harness
        run: |
          python -m pip install --upgrade pip
          python -m pip install "anolis-protocol[conformance] @ https://github.com/anolishq/anolis-protocol/releases/download/v1.4.0/anolis_protocol-1.4.0-py3-none-any.whl"

      - name: Run ADPP conformance against the built binary
        working-directory: anolis-provider-bread
        run: |
          anolis-adpp-conformance \
            --provider-bin build/ci-linux-release/anolis-provider-bread \
            --provider-config config/conformance.yaml \
            --provider-profile config/conformance.toml \
            -ra

  version-sync:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    uses: anolishq/.github/.github/workflows/version-sync.yml@c76784aff711e6540d539f6a5c3ea33c63627930 # v2
    with:
      python-version: '3.12'
      working-directory: '.'

  cpp-format:
    name: C++ Formatting (clang-format)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check formatting
        # Pin the EXACT clang-format via the PyPI wheel (byte-identical on every
        # runner/distro). The apt packages drift: unversioned `clang-format` on
        # ubuntu-24.04 is an experimental 18.0 snapshot, and `clang-format-18` is
        # 18.1.3 there but 18.1.8 elsewhere — and 18.1.3 vs 18.1.8 wrap long
        # operator chains differently. Match locally with the same spec.
        run: |
          set -euo pipefail
          FILES=$(find src tests -type f \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \))
          if [ -z "$FILES" ]; then
            echo "No C++ files found"
            exit 1
          fi
          echo "$FILES" | xargs pipx run clang-format==18.1.8 --dry-run --Werror

  ok:
    name: ok
    if: always()
    needs:
      - changes
      - no-hardware-linux
      - no-hardware-windows
      - provider-conformance
      - cpp-format
      - version-sync
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate job results
        run: |
          echo "Job results: ${{ toJSON(needs.*.result) }}"
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
