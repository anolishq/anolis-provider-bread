name: Hardening

# Memory-safety / data-race hardening for provider-bread.
#   - tsan:     ThreadSanitizer over the unit tests. bread is single-threaded
#               today (inline-mutex crumbs::Session), so TSAN finds little now;
#               the lane is forward-looking for the planned worker-thread
#               i2c-serialization convergence (audit §6.9). Valgrind carries the
#               present-day value.
#   - valgrind: shared org leak-check over `--check-config` (config load).
# Both fail only on a real (first-party) finding; third-party false positives
# are scoped in tsan.supp / valgrind.supp (first run per change = triage pass).

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: provider-bread-hardening-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tsan:
    name: ThreadSanitizer (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build g++

      - name: Setup vcpkg
        uses: anolishq/.github/.github/actions/setup-vcpkg@c76784aff711e6540d539f6a5c3ea33c63627930 # v2
        with:
          triplet: x64-linux-static

      - name: Configure
        run: cmake --preset ci-tsan

      - name: Build
        run: cmake --build --preset ci-tsan --parallel

      - name: Run tests with TSAN
        env:
          TSAN_OPTIONS: "suppressions=${{ github.workspace }}/tsan.supp second_deadlock_stack=1 detect_deadlocks=1 history_size=7 log_path=${{ github.workspace }}/tsan-report"
        run: |
          set +e
          set -o pipefail
          export CTEST_PARALLEL_LEVEL=1
          timeout 20m ctest --preset ci-tsan --timeout 300 -VV 2>&1 | tee tsan-output.log
          EXIT_CODE=${PIPESTATUS[0]}

          if ls tsan-report.* >/dev/null 2>&1; then
            echo "::error::ThreadSanitizer reported data races (see tsan-logs artifact)"
            exit 1
          fi

          exit $EXIT_CODE

      - name: Upload TSAN logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tsan-logs-${{ github.run_number }}
          path: |
            tsan-report.*
            tsan-output.log
            build/ci-tsan/Testing/Temporary/LastTest.log
          if-no-files-found: ignore
          retention-days: 14

  valgrind:
    name: Valgrind leak-check
    uses: anolishq/.github/.github/workflows/valgrind-leak.yml@c76784aff711e6540d539f6a5c3ea33c63627930 # v2
    with:
      build-preset: ci-linux-release
      build-target: anolis-provider-bread
      run: "build/ci-linux-release/anolis-provider-bread --check-config config/ci.test.yaml"
      suppressions: valgrind.supp
