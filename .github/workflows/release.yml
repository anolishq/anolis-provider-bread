name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  metrics:
    name: Collect metrics
    uses: anolishq/.github/.github/workflows/metrics.yml@c76784aff711e6540d539f6a5c3ea33c63627930 # v2
    with:
      tag: ${{ github.ref_name }}

  release-linux-x86_64:
    name: Release (linux-x86_64)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: anolis-provider-bread

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ jq

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup vcpkg
        uses: anolishq/.github/.github/actions/setup-vcpkg@a9b3d134acbcc7dcd6da02c1a345a1fbdca15064 # v2.4
        with:
          triplet: x64-linux-static

      - name: Configure
        working-directory: anolis-provider-bread
        run: cmake --preset ci-linux-release

      - name: Build
        working-directory: anolis-provider-bread
        run: cmake --build --preset ci-linux-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        run: ctest --preset ci-linux-release

      - name: Package binary artifact
        id: package
        working-directory: anolis-provider-bread
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="anolis-provider-bread-${VERSION}-linux-x86_64.tar.gz"
          BINARY="build/ci-linux-release/anolis-provider-bread"
          if [ ! -f "${BINARY}" ]; then
            echo "ERROR: binary not found at ${BINARY}" >&2
            exit 1
          fi
          mkdir -p staging/bin
          cp "${BINARY}" staging/bin/
          tar -czf "${ARTIFACT}" -C staging .
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Package source tarball
        working-directory: anolis-provider-bread
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git archive --format=tar.gz \
            --prefix="anolis-provider-bread-${VERSION}/" \
            -o "anolis-provider-bread-${VERSION}-source.tar.gz" \
            HEAD

      - name: Generate checksums
        working-directory: anolis-provider-bread
        run: sha256sum anolis-provider-bread-*.tar.gz > SHA256SUMS

      - name: Generate manifest
        working-directory: anolis-provider-bread
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="${{ steps.package.outputs.artifact }}"
          SHA=$(grep "${ARTIFACT}" SHA256SUMS | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "anolishq/anolis-provider-bread" \
            --arg component "anolis_provider_bread" \
            --arg version "${VERSION}" \
            --arg platform "linux-x86_64" \
            --arg asset "${ARTIFACT}" \
            --arg sha256 "${SHA}" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, platform: $platform, asset: $asset, sha256: $sha256}' \
            > manifest.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            anolis-provider-bread/anolis-provider-bread-*.tar.gz
            anolis-provider-bread/SHA256SUMS
            anolis-provider-bread/manifest.json
          generate_release_notes: true

  release-linux-arm64:
    name: Release (linux-arm64)
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout anolis-provider-bread
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          path: anolis-provider-bread

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ jq

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup vcpkg
        uses: anolishq/.github/.github/actions/setup-vcpkg@a9b3d134acbcc7dcd6da02c1a345a1fbdca15064 # v2.4
        with:
          triplet: arm64-linux

      - name: Configure
        working-directory: anolis-provider-bread
        run: cmake --preset ci-linux-arm64-release

      - name: Build
        working-directory: anolis-provider-bread
        run: cmake --build --preset ci-linux-arm64-release --parallel

      - name: Test
        working-directory: anolis-provider-bread
        run: ctest --preset ci-linux-arm64-release

      - name: Package binary artifact
        id: package
        working-directory: anolis-provider-bread
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="anolis-provider-bread-${VERSION}-linux-arm64.tar.gz"
          BINARY="build/ci-linux-arm64-release/anolis-provider-bread"
          if [ ! -f "${BINARY}" ]; then
            echo "ERROR: binary not found at ${BINARY}" >&2
            exit 1
          fi
          mkdir -p staging/bin
          cp "${BINARY}" staging/bin/
          tar -czf "${ARTIFACT}" -C staging .
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Generate manifest
        working-directory: anolis-provider-bread
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARTIFACT="${{ steps.package.outputs.artifact }}"
          SHA=$(sha256sum "${ARTIFACT}" | awk '{print $1}')
          jq -n \
            --argjson schema_version 1 \
            --arg repo "anolishq/anolis-provider-bread" \
            --arg component "anolis_provider_bread" \
            --arg version "${VERSION}" \
            --arg platform "linux-arm64" \
            --arg asset "${ARTIFACT}" \
            --arg sha256 "${SHA}" \
            '{schema_version: $schema_version, repo: $repo, component: $component, version: $version, platform: $platform, asset: $asset, sha256: $sha256}' \
            > manifest-linux-arm64.json

      - name: Upload to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: |
            anolis-provider-bread/anolis-provider-bread-*-linux-arm64.tar.gz
            anolis-provider-bread/manifest-linux-arm64.json


  aggregate-checksums:
    name: Aggregate checksums
    runs-on: ubuntu-24.04
    needs: [release-linux-x86_64, release-linux-arm64]
    steps:
      - name: Regenerate SHA256SUMS across all release tarballs
        env:
          GH_TOKEN: ${{ github.token }}
        # Each build job uploads its own tarball; the x86_64 job's SHA256SUMS
        # never covered the arm64 asset (#102). Rebuild the checksum file from
        # everything actually attached to the release, then replace it.
        run: |
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --pattern '*.tar.gz'
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS
          gh release upload "${GITHUB_REF_NAME}" SHA256SUMS --clobber --repo "${GITHUB_REPOSITORY}"

  upload-metrics:
    name: Upload metrics to release
    runs-on: ubuntu-24.04
    needs: [release-linux-x86_64, release-linux-arm64, metrics]
    steps:
      - name: Download metrics artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: metrics-${{ github.event.repository.name }}-${{ github.run_number }}
          path: metrics-out/

      - name: Upload metrics.json to release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: metrics-out/metrics.json
